name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Pinned to windows-2022 (VS 2022 / version 17). windows-latest has
    # rolled to an image with VS 18 (the "Microsoft Visual Studio\18"
    # path), and node-gyp 11.5.0 can't parse that version string — its
    # PowerShell-based VS finder returns "undefined" and then hits a
    # stdio buffer overflow, killing the native-addon postinstall.
    # Revisit once node-gyp ships VS 18 detection (and our local Node 24
    # dev env confirms the new gyp works against da-win32).
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native addon
        run: npm run rebuild

      - name: Build app
        run: npm run build

      - name: Package portable exe
        run: npx electron-builder --win --publish never

      - name: Attach portable exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-portable.exe

      - name: Notify Discord
        if: success()
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $releaseUrl = "https://github.com/$repo/releases/tag/$tag"
          $body = @{
            content = "**Epona $tag** is now available!`n$releaseUrl"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK_URL }}" -Method Post -ContentType "application/json" -Body $body

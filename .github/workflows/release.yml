name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native addon
        run: npm run rebuild

      - name: Build app
        run: npm run build

      - name: Package portable exe
        run: npx electron-builder --win --publish never

      - name: Attach portable exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-portable.exe

      - name: Notify Discord
        if: success()
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $releaseUrl = "https://github.com/$repo/releases/tag/$tag"
          $body = @{
            content = "**Epona $tag** is now available!`n$releaseUrl"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK_URL }}" -Method Post -ContentType "application/json" -Body $body

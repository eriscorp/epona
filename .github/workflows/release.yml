name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    # Pinned to windows-2022 (VS 2022 / version 17). windows-latest has
    # rolled to an image with VS 18 (the "Microsoft Visual Studio\18"
    # path), and node-gyp 11.5.0 can't parse that version string — its
    # PowerShell-based VS finder returns "undefined" and then hits a
    # stdio buffer overflow, killing the da-win32 native-addon rebuild.
    # Revisit once node-gyp ships VS 18 detection (and our local Node 24
    # dev env confirms the new gyp works against da-win32).
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native addon
        run: npm run rebuild

      - name: Build app
        run: npm run build

      - name: Package portable exe
        run: npx electron-builder --win --publish never

      - name: Resolve artifact version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Sign portable exe (SSL.com eSigner)
        uses: sslcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/dist/epona-${{ steps.version.outputs.version }}-portable.exe
          override: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/*-portable.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # da-win32's beforeBuild rebuild only makes sense on Windows; override
      # it with the noop so Linux packaging doesn't try to rebuild the addon.
      - name: Package Linux deb + AppImage
        run: npx electron-builder --linux --config.beforeBuild=scripts/noop-before-build.cjs --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Set up our own signing keychain (rather than electron-builder's
      # CSC_LINK throwaway) so the post-build dmg codesign can reach the
      # same Developer ID identity. electron-builder auto-discovers it.
      - name: Import Developer ID signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"

          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          # Make our keychain searchable/default for the toolchain.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -s "$KEYCHAIN"

          rm -f "$CERT_PATH"

      - name: Write App Store Connect API key
        id: asc
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "$KEY_PATH"
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      # electron-builder signs + notarizes + staples the .app (auto-discovers
      # the identity from our keychain), then wraps it in the dmg. The noop
      # beforeBuild override skips the Windows-only da-win32 rebuild.
      - name: Package, sign + notarize app
        run: npx electron-builder --mac --config.beforeBuild=scripts/noop-before-build.cjs --publish never
        env:
          APPLE_API_KEY: ${{ steps.asc.outputs.key_path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # The dmg itself is unsigned/un-notarized out of electron-builder, so a
      # downloaded dmg would trip Gatekeeper. Sign, notarize + staple it too.
      - name: Sign, notarize + staple the dmg
        env:
          APPLE_API_KEY: ${{ steps.asc.outputs.key_path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          DMG="dist/epona-${VERSION}.dmg"
          codesign --force --timestamp \
            --sign "Developer ID Application: ERISCO LLC (D4Q96JRVKU)" "$DMG"
          xcrun notarytool submit "$DMG" \
            --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-mac]
    if: github.ref_type == 'tag'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*-portable.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Notify Discord
        if: success()
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/$REPO/releases/tag/$TAG"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"**Epona $TAG** is now available!\n$RELEASE_URL\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

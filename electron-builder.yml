appId: co.eris.epona
productName: Epona
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!packages/da-win32/src/**'
  - '!packages/da-win32/binding.gyp'
asarUnpack:
  - resources/**
  - node_modules/da-win32/build/**
  - packages/da-win32/build/**
win:
  executableName: Epona
  icon: resources/epona.png
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  category: public.app-category.games
  icon: resources/epona.png
  # da-win32 is a Windows-only native module; on macOS it compiles to an
  # empty stub that's never require()'d (the load is gated behind
  # process.platform === 'win32'). The stub is byte-identical across arches
  # and can't be lipo-merged, so tell @electron/universal to ship it as-is
  # rather than failing the arch merge.
  x64ArchFiles: '**/da_win32.node'
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch: universal
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  category: Game
  icon: resources/epona.png
  maintainer: Hybrasyl Maintainers <hybrasyl@eris.co>
  target:
    - deb
    - AppImage
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
npmRebuild: false
beforeBuild: npx @electron/rebuild -f -w da-win32
